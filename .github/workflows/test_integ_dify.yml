name: Integ (dify knowledge via mock server)

permissions:
  contents: read

"on":
  push:
    branches: [main]
    paths:
      - integ/**
      - python/**
      - .github/workflows/test_integ_dify.yml
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      hit: ${{ steps.filter.outputs.hit }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hit:
              - 'integ/**'
              - 'python/**'
              - '.github/workflows/test_integ_dify.yml'

  integ-dify:
    needs: changes
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || needs.changes.outputs.hit == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: python
        run: uv sync --all-extras --no-extra camel

      - name: Run dify integ (mock server) and diff against truth
        run: |
          ./python/.venv/bin/python integ/dify.py > /tmp/dify.out
          diff integ/truth_dify.txt /tmp/dify.out

  gate:
    name: integ-dify-gate
    runs-on: ubuntu-latest
    needs: [changes, integ-dify]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "$results"
          case "$results" in
            *failure*|*cancelled*) exit 1 ;;
          esac
